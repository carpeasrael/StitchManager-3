app-id: de.carpeasrael.stichman
runtime: org.gnome.Platform
runtime-version: '46'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
  - org.freedesktop.Sdk.Extension.node20
command: stichman

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --share=network
  - --filesystem=home
  - --filesystem=/media:ro
  - --filesystem=/run/media:ro

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin:/usr/lib/sdk/node20/bin
  env:
    CARGO_HOME: /run/build/stichman/cargo
    npm_config_nodedir: /usr/lib/sdk/node20

modules:
  - name: stichman
    buildsystem: simple
    build-options:
      env:
        CARGO_HOME: /run/build/stichman/cargo
    build-commands:
      # Frontend build
      - npm ci --offline
      - npm run build
      # Rust/Tauri build
      - cargo --offline build --release --manifest-path src-tauri/Cargo.toml
      # Install binary
      - install -Dm755 src-tauri/target/release/app /app/bin/stichman
      # Install desktop integration
      - install -Dm644 flatpak/de.carpeasrael.stichman.desktop /app/share/applications/de.carpeasrael.stichman.desktop
      - install -Dm644 flatpak/de.carpeasrael.stichman.metainfo.xml /app/share/metainfo/de.carpeasrael.stichman.metainfo.xml
      # Install icons
      - install -Dm644 src-tauri/icons/256x256.png /app/share/icons/hicolor/256x256/apps/de.carpeasrael.stichman.png
      - install -Dm644 src-tauri/icons/128x128.png /app/share/icons/hicolor/128x128/apps/de.carpeasrael.stichman.png
      - install -Dm644 src-tauri/icons/64x64.png /app/share/icons/hicolor/64x64/apps/de.carpeasrael.stichman.png
      - install -Dm644 src-tauri/icons/32x32.png /app/share/icons/hicolor/32x32/apps/de.carpeasrael.stichman.png
    sources:
      # Application source — update tag and commit for each release
      - type: git
        url: https://github.com/carpeasrael/StitchManager-3.git
        tag: v26.03
        commit: 50b7d8d33ec3f829d93cf607fcca4c705f81526e
      # Offline Cargo dependencies — generated by flatpak-cargo-generator
      - generated-sources/cargo-sources.json
      # Offline npm dependencies — generated by flatpak-node-generator
      - generated-sources/node-sources.json
